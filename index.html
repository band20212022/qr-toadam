<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đang chuyển hướng...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3; url=https://drive.google.com/drive/mobile/folders/1u6dVTIUVcxpaw5X2vbqJDmjQY_iBYLJT?hl=vi">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      animation: fadeIn 1s ease-in-out;
    }

    img {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    h2 {
      margin: 10px 0;
    }

    .loader {
      margin-top: 15px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- THAY LOGO Ở ĐÂY -->
    <img src="logo.jpg" alt="Logo">
     <h4>TỌA ĐÀM</h4>
    <h3>NỢ XẤU TRONG BỐI CẢNH MỚI</h3>
    <p>Đang mở tài liệu...</p>
    <p>Vui lòng chờ trong giây lát</p>

    <div class="loader"></div>
  </div>

  <script>
  const link = "https://drive.google.com/drive/mobile/folders/1u6dVTIUVcxpaw5X2vbqJDmjQY_iBYLJT?hl=vi";

  // Cách 1: setTimeout
  setTimeout(() => {
    window.location.href = link;
  }, 3000);

  // Cách 2: fallback (backup)
  setInterval(() => {
    window.location.replace(link);
  }, 3000);
</script>

</body>
</html>
